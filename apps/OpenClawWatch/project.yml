name: OpenClawWatch
options:
  bundleIdPrefix: ai.openclaw
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
targets:
  OpenClawCompanion:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
      - path: Sources/iOS
    info:
      path: Sources/iOS/Info.plist
      properties:
        CFBundleDisplayName: OpenClaw
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: The companion can relay Watch voice messages to your configured OpenClaw bridge.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.openclaw.OpenClawCompanion
    dependencies:
      - target: OpenClawWatchApp
        embed: true
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
  OpenClawWatchApp:
    type: application
    platform: watchOS
    sources:
      - path: Sources/Shared
      - path: Sources/Watch
    info:
      path: Sources/Watch/Info.plist
      properties:
        CFBundleDisplayName: OpenClaw
        WKApplication: true
        WKCompanionAppBundleIdentifier: ai.openclaw.OpenClawCompanion
        NSMicrophoneUsageDescription: OpenClaw records audio only when you press the Watch push-to-talk control.
        NSLocationWhenInUseUsageDescription: OpenClaw can attach your current location to Watch voice messages when you allow it.
        NSLocationTemporaryUsageDescriptionDictionary:
          PreciseWatchVoiceMessage: OpenClaw can attach precise location to a voice message when you ask location-aware questions.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.openclaw.OpenClawCompanion.watchkitapp
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
