name: OpenClawWatch
options:
  bundleIdPrefix: ai.openclaw
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: "36"
    MARKETING_VERSION: "0.1.10"
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
schemes:
  OpenClawCompanion:
    build:
      targets:
        OpenClawCompanion: all
    run:
      config: Debug
    archive:
      config: Release
    test:
      targets:
        - OpenClawCompanionTests
  OpenClawWatchApp:
    build:
      targets:
        OpenClawWatchApp: all
    run:
      config: Debug
    archive:
      config: Release
  ClawBridgeComplicationExtension:
    build:
      targets:
        ClawBridgeComplicationExtension: all
    run:
      config: Debug
    archive:
      config: Release
targets:
  OpenClawCompanion:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
        excludes:
          - PrivateAssets.xcassets
      - path: Sources/iOS
    info:
      path: Sources/iOS/Info.plist
      properties:
        CFBundleDisplayName: $(CLAW_BRIDGE_IOS_DISPLAY_NAME)
        CFBundleName: $(CLAW_BRIDGE_IOS_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ClawBridgeDefaultBaseURL: $(CLAW_BRIDGE_DEFAULT_BASE_URL)
        ClawBridgeHostAppName: $(CLAW_BRIDGE_HOST_APP_NAME)
        ClawBridgeHostAppScheme: $(CLAW_BRIDGE_HOST_APP_SCHEME)
        ClawBridgeLegacyMigrationBearerToken: $(CLAW_BRIDGE_DEFAULT_BEARER_TOKEN)
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: $(CLAW_BRIDGE_IOS_DISPLAY_NAME) can relay Watch voice messages to your configured OpenClaw bridge.
        NSLocationWhenInUseUsageDescription: $(CLAW_BRIDGE_IOS_DISPLAY_NAME) can attach your current location to Watch voice messages when you allow it.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(CLAW_BRIDGE_BUNDLE_ID_PREFIX).ClawBridge
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_ENTITLEMENTS: $(CLAW_BRIDGE_IOS_ENTITLEMENTS)
    dependencies:
      - target: OpenClawWatchApp
        embed: true
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
  OpenClawWatchApp:
    type: application.watchapp2
    platform: watchOS
    sources:
      - path: Sources/Shared/PublicAssets.xcassets
    dependencies:
      - target: OpenClawWatchExtension
      - target: ClawBridgeComplicationExtension
        embed: true
    info:
      path: Sources/Watch/Info.plist
      properties:
        CFBundleDisplayName: $(CLAW_BRIDGE_WATCH_DISPLAY_NAME)
        CFBundleName: $(CLAW_BRIDGE_WATCH_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLName: $(CLAW_BRIDGE_BUNDLE_ID_PREFIX).ClawBridge.watchkitapp
            CFBundleURLSchemes:
              - clawbridge
        NSLocationWhenInUseUsageDescription: $(CLAW_BRIDGE_WATCH_DISPLAY_NAME) can attach your current location to Watch voice messages when you allow it.
        NSLocationTemporaryUsageDescriptionDictionary:
          PreciseWatchVoiceMessage: $(CLAW_BRIDGE_WATCH_DISPLAY_NAME) can attach precise location to a voice message when you ask location-aware questions.
        WKCompanionAppBundleIdentifier: $(CLAW_BRIDGE_BUNDLE_ID_PREFIX).ClawBridge
        WKWatchKitApp: true
        UIBackgroundModes:
          - audio
        WKBackgroundModes:
          - workout-processing
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: $(CLAW_BRIDGE_BUNDLE_ID_PREFIX).ClawBridge.watchkitapp
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
  OpenClawWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    sources:
      - path: Sources/Shared
        excludes:
          - PrivateAssets.xcassets
      - path: Sources/Watch
        excludes:
          - Info.plist
          - Resources/AssistantPortrait.*
    info:
      path: Sources/WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: $(CLAW_BRIDGE_WATCH_DISPLAY_NAME)
        CFBundleName: $(CLAW_BRIDGE_WATCH_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ClawBridgeDefaultBaseURL: $(CLAW_BRIDGE_DEFAULT_BASE_URL)
        ClawBridgeLegacyMigrationBearerToken: $(CLAW_BRIDGE_DEFAULT_BEARER_TOKEN)
        NSMicrophoneUsageDescription: $(CLAW_BRIDGE_WATCH_DISPLAY_NAME) records audio only when you press the Watch push-to-talk control.
        NSLocationWhenInUseUsageDescription: $(CLAW_BRIDGE_WATCH_DISPLAY_NAME) can attach your current location to Watch voice messages when you allow it.
        NSLocationTemporaryUsageDescriptionDictionary:
          PreciseWatchVoiceMessage: $(CLAW_BRIDGE_WATCH_DISPLAY_NAME) can attach precise location to a voice message when you ask location-aware questions.
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: $(CLAW_BRIDGE_BUNDLE_ID_PREFIX).ClawBridge.watchkitapp
          NSExtensionPointIdentifier: com.apple.watchkit
        UIBackgroundModes:
          - audio
        NSHealthShareUsageDescription: $(CLAW_BRIDGE_WATCH_DISPLAY_NAME) can start a golf workout to keep location ready while you use Golf Mode.
        NSHealthUpdateUsageDescription: $(CLAW_BRIDGE_WATCH_DISPLAY_NAME) can record a golf workout while Golf Mode is active.
        WKBackgroundModes:
          - workout-processing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(CLAW_BRIDGE_BUNDLE_ID_PREFIX).ClawBridge.watchkitapp.watchkitextension
        CODE_SIGN_ENTITLEMENTS: Sources/Watch/OpenClawWatchExtension.entitlements
        ASSETCATALOG_COMPILER_COMPLICATION_NAME: ""
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
  ClawBridgeComplicationExtension:
    type: app-extension
    platform: watchOS
    sources:
      - path: Sources/Complication
    info:
      path: Sources/Complication/Info.plist
      properties:
        CFBundleDisplayName: $(CLAW_BRIDGE_WATCH_DISPLAY_NAME)
        CFBundleName: $(CLAW_BRIDGE_WATCH_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(CLAW_BRIDGE_BUNDLE_ID_PREFIX).ClawBridge.watchkitapp.ClawBridgeComplicationExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
  OpenClawCompanionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/iOS
    dependencies:
      - target: OpenClawCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(CLAW_BRIDGE_BUNDLE_ID_PREFIX).ClawBridgeTests
        GENERATE_INFOPLIST_FILE: YES
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
